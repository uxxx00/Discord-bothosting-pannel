<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Editor — Cluster Controller</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .editor-layout { display: flex; height: calc(100vh - 72px); flex-direction: column; background: var(--bg); }
        .editor-top { flex: 1; display: flex; overflow: hidden; }
        .sidebar { width: 300px; height: 100%; border-right: 1px solid var(--border); background: rgba(5, 5, 10, 0.6); backdrop-filter: blur(20px); padding: 30px; overflow-y: auto; box-shadow: 10px 0 30px rgba(0,0,0,0.5); z-index: 10; }
        .main-editor { flex: 1; height: 100%; padding: 0; display: flex; flex-direction: column; background: #0d0d12; position: relative; }
        .editor-header { display:flex; justify-content:space-between; padding: 15px 30px; align-items:center; background: rgba(0,0,0,0.4); border-bottom: 1px solid rgba(255,255,255,0.02); }
        
        textarea { flex: 1; background: transparent; border: none; color: #a9b1d6; font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; font-size: 15px; padding: 30px; outline: none; line-height: 1.6; resize: none; }
        textarea::selection { background: rgba(114, 137, 218, 0.3); }

        .terminal-tray { height: 350px; background: #050508; border-top: 1px solid var(--border); display: flex; flex-direction: column; position: relative; z-index: 20; box-shadow: 0 -10px 40px rgba(0,0,0,0.8); }
        .terminal-header { padding: 15px 30px; background: #09090e; border-bottom: 1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between; align-items:center; }
        
        .mac-dots { display: flex; gap: 8px; }
        .mac-dots div { width: 12px; height: 12px; border-radius: 50%; }
        .dot-r { background: #ff5f56; } .dot-y { background: #ffbd2e; } .dot-g { background: #27c93f; }

        .terminal-body { flex: 1; padding: 20px 30px; font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; color: #39FF14; overflow-y: auto; font-size: 13px; line-height: 1.5; scroll-behavior: smooth; }
        .input-bar { padding: 15px 30px; border-top: 1px solid rgba(255,255,255,0.05); background: #09090e; display:flex; gap:15px; align-items:center; }
        .input-bar span { color: #58a6ff; font-weight: 700; font-family: 'JetBrains Mono', monospace; text-shadow: 0 0 10px rgba(88, 166, 255, 0.4); }
        .input-bar input { background: transparent; border: none; color: #fff; font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 14px; flex: 1; padding: 5px 0; outline: none; caret-color: #58a6ff; }
        .input-bar input::placeholder { color: rgba(255,255,255,0.2); }

        .hide-desktop { display: none; }

        @media (max-width: 900px) {
            .navbar { padding: 0 15px; height: 64px; }
            .nav-logo { font-size: 16px; }
            .hide-mobile { display: none !important; }
            .hide-desktop { display: flex !important; }

            .editor-layout { height: calc(100vh - 64px); }
            .sidebar { 
                position: fixed; 
                left: -320px; 
                top: 64px; 
                bottom: 0; 
                width: 300px; 
                transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
                box-shadow: 20px 0 50px rgba(0,0,0,0.8);
                padding: 20px;
                background: #050508;
            }
            .sidebar.active { left: 0; }
            
            .main-editor { width: 100%; transition: 0.3s; }
            .editor-header { padding: 10px 20px; }
            textarea { padding: 20px; font-size: 14px; }
            
            .terminal-tray { height: 40px; transition: 0.3s; }
            .terminal-tray.active { height: 280px; }
            .terminal-header { padding: 8px 15px; }
            .terminal-body { padding: 10px 15px; font-size: 11px; }
            .input-bar { padding: 10px 15px; gap: 10px; }
            .input-bar span { font-size: 11px; }
            .input-bar input { font-size: 12px; }
        }
    </style>
</head>
<body style="overflow:hidden;">
    <nav class="navbar">
        <div style="display:flex; align-items:center; gap:10px;">
            <button class="btn btn-ghost hide-desktop" onclick="toggleSidebar()" style="padding:8px; width:36px; height:36px; justify-content:center; border-radius:8px;">☰</button>
            <div class="nav-logo" onclick="location.href='/dashboard.html'">Royal Control</div>
        </div>
        <div style="display:flex; gap:8px;">
            <span id="bot-name-display" class="hide-mobile" style="font-weight:800; text-transform:uppercase; letter-spacing:1px; color:#555; font-size:12px; align-self:center; margin-right:15px;">INSTANCE #0</span>
            <button class="btn btn-ghost" style="padding:8px 15px; font-size:11px;" onclick="saveBot()">Save</button>
            <button id="start-btn" class="btn btn-primary" style="padding:8px 15px; font-size:11px;" onclick="startBot()">Run</button>
            <button id="stop-btn" class="btn btn-ghost" style="padding:8px 15px; font-size:11px; color:#ff4444; border-color:#ff4444;" onclick="stopBot()">Kill</button>
        </div>
    </nav>

    <div class="editor-layout">
        <div class="editor-top">
            <div class="sidebar">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h3 style="font-size:12px; font-weight:800; text-transform:uppercase; color:#555; letter-spacing:1px;">Cluster Files</h3>
                    <div style="display:flex; gap:5px;">
                        <button class="btn btn-ghost hide-desktop" style="padding:6px; font-size:12px;" onclick="toggleSidebar()">✕</button>
                        <button class="btn btn-ghost" style="padding:6px; font-size:12px; border-radius:6px;" onclick="loadFiles()" title="Refresh Files">↻</button>
                        <button class="btn btn-ghost" style="padding:6px; font-size:12px; border-radius:6px;" onclick="document.getElementById('file-upload').click()" title="Upload Files/ZIP">☁️</button>
                        <button class="btn btn-ghost" style="padding:6px; font-size:12px; border-radius:6px;" onclick="newFolder()" title="New Folder">📁</button>
                        <button class="btn btn-primary" style="padding:6px 10px; font-size:10px; border-radius:6px; box-shadow:0 0 10px var(--p);" onclick="newFile()">+ New File</button>
                        <input type="file" id="file-upload" style="display:none;" multiple onchange="uploadFiles(this)">
                    </div>
                </div>
                <div id="file-list" style="display:flex; flex-direction:column; gap:5px;"></div>
                
                <h3 style="font-size:12px; font-weight:800; text-transform:uppercase; color:#555; margin:30px 0 20px; letter-spacing:1px;">Environment</h3>
                <input type="text" id="bot-token" placeholder="DISCORD_TOKEN" style="margin-bottom:10px;">
                <div id="discord-identity" style="display:none; align-items:center; gap:10px; padding:10px; background:rgba(114,137,218,0.1); border:1px solid rgba(114,137,218,0.3); border-radius:8px; margin-bottom:10px;">
                    <img id="discord-avatar" src="" style="width:30px; height:30px; border-radius:50%;">
                    <div style="display:flex; flex-direction:column;">
                        <span id="discord-username" style="color:#fff; font-size:12px; font-weight:bold;">Bot Name</span>
                        <span style="color:#7289da; font-size:10px; font-weight:800;">VERIFIED DISCORD CONNECTION</span>
                    </div>
                </div>
                <input type="text" id="bot-name" placeholder="Project Name">
            </div>
            
            <div class="main-editor">
                <div class="editor-header">
                    <div style="font-size:11px; font-weight:800; color:var(--p); letter-spacing:1px;" id="active-filename">BOT.JS</div>
                    <div style="font-size:10px; opacity:0.3; color:#fff;">UTF-8</div>
                </div>
                <textarea id="editor" spellcheck="false" placeholder="// Write high-performance code here..."></textarea>
            </div>
        </div>

        <div class="terminal-tray">
            <div class="terminal-header">
                <div style="display:flex; gap:20px; align-items:center;">
                    <div class="mac-dots">
                        <div class="dot-r" onclick="toggleTerminal(false)" style="cursor:pointer;" title="Minimize"></div>
                        <div class="dot-y" onclick="toggleTerminal()" style="cursor:pointer;" title="Toggle"></div>
                        <div class="dot-g" onclick="toggleTerminal(true)" style="cursor:pointer;" title="Maximize"></div>
                    </div>
                    <div style="font-weight:700; color:#fff; font-size:13px; letter-spacing:1px; text-transform:uppercase;">
                        Direct Live Shell <span id="status-text" style="font-size:10px; color:#58a6ff; margin-left:10px; padding:2px 6px; background:rgba(88,166,255,0.1); border-radius:4px;">IDLE</span>
                    </div>
                    <div style="display:flex; gap:15px; margin-left:20px; border-left:1px solid rgba(255,255,255,0.1); padding-left:20px;">
                        <div style="display:flex; flex-direction:column;">
                            <span style="font-size:9px; color:#555; font-weight:800; text-transform:uppercase;">RAM Usage</span>
                            <span id="ram-usage" style="font-size:12px; color:#39FF14; font-weight:800; font-family:monospace;">0 MB</span>
                        </div>
                        <div style="display:flex; flex-direction:column;">
                            <span style="font-size:9px; color:#555; font-weight:800; text-transform:uppercase;">CPU Load</span>
                            <span id="cpu-usage" style="font-size:12px; color:#39FF14; font-weight:800; font-family:monospace;">0%</span>
                        </div>
                    </div>
                </div>
                <div style="display:flex; gap:10px; font-size:11px; align-items:center;">
                    <span id="status-dot" class="pulse" style="width:8px; height:8px; background:#58a6ff; box-shadow:0 0 10px #58a6ff;"></span>
                    <span style="opacity:0.6; font-weight:700; letter-spacing:1px;">ACTIVE CONNECTION</span>
                </div>
            </div>
            <div class="terminal-body" id="console-output"></div>
            <div class="input-bar">
                <span>royal-cluster:~$</span>
                <input type="text" id="terminal-input" placeholder="Execute any native host OS command directly (npm install, dir, cat, pip)..." autocomplete="off" spellcheck="false" onkeydown="execCommand(event)">
                <button class="btn btn-ghost" style="padding:4px 12px; color:#39FF14; border-color:#39FF14; font-size:10px; height:24px; display:flex; align-items:center; white-space:nowrap; border-radius:4px; font-weight:800;" onclick="forceExec()">EXEC</button>
                <button class="btn btn-ghost" style="padding:4px 12px; color:#ff4444; border-color:#ff4444; font-size:10px; height:24px; display:flex; align-items:center; white-space:nowrap; border-radius:4px; font-weight:800;" onclick="stopTerminalCmd()">FORCE KILL</button>
            </div>
        </div>
    </div>

    <script src="bot-editor.js"></script>
</body>
</html>
