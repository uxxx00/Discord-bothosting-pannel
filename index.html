<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Hosting — Professional Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Minimalist Professional Background -->

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Theme">
        <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>

    <div class="card-container glass-panel">
        <!-- Tab Navigation (Only visible for login/signup) -->
        <div class="tabs" id="tabs-container">
            <button class="tab-btn active" onclick="switchTab('login')" id="btn-login">Log In</button>
            <button class="tab-btn" onclick="switchTab('signup')" id="btn-signup">Sign Up</button>
            <div class="tab-slider" id="tab-slider"></div>
        </div>

        <!-- 1: Login Form -->
        <form class="auth-box active" id="login-form" onsubmit="handleLogin(event)">
            <h2>Welcome Back</h2>
            <p class="subtitle">Enter your details to access your account.</p>

            <div class="input-wrapper">
                <input type="email" id="login-email" required placeholder="name@example.com">
                <label>Email</label>
            </div>
            
            <div class="input-wrapper">
                <input type="password" id="login-password" required placeholder="••••••••">
                <label>Password</label>
            </div>

            <button type="submit" class="main-btn btn-anim">Sign In</button>

            <div class="divider"><span>or continue with</span></div>

            <div class="social-group">
                <button type="button" class="social-btn btn-anim provider-google">
                    <!-- Inline SVG Google Icon -->
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> 
                    Google
                </button>
                <button type="button" class="social-btn btn-anim provider-github">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg> GitHub
                </button>
            </div>
        </form>

        <!-- 2: Sign Up Form -->
        <form class="auth-box" id="signup-form" onsubmit="handleSignUp(event)">
            <h2>Create Account</h2>
            <p class="subtitle">Join us today. It's free and simple.</p>

            <div class="input-wrapper">
                <input type="text" id="signup-name" required placeholder="John Doe">
                <label>Name</label>
            </div>
            <div class="input-wrapper">
                <input type="email" id="signup-email" required placeholder="name@example.com">
                <label>Email</label>
            </div>
            <div class="input-wrapper">
                <input type="password" id="signup-password" required placeholder="••••••••">
                <label>Password</label>
            </div>

            <button type="submit" class="main-btn btn-anim">Sign Up</button>

            <div class="divider"><span>or continue with</span></div>

            <div class="social-group">
                <button type="button" class="social-btn btn-anim provider-google">
                    <!-- Inline SVG Google Icon -->
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> 
                    Google
                </button>
                <button type="button" class="social-btn btn-anim provider-github">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg> GitHub
                </button>
            </div>
        </form>

        <!-- 3: OTP Verification Form -->
        <form class="auth-box" id="verify-form" onsubmit="handleVerify(event)">
            <h2>Verify Email</h2>
            <p class="subtitle">Please enter the 6-digit verification code sent to your email.</p>
            
            <div class="input-wrapper">
                <input type="text" id="verify-code" required placeholder="123456" maxlength="6" style="text-align: center; letter-spacing: 4px; font-weight: 600;">
                <label>Verification Code</label>
            </div>

            <button type="submit" class="main-btn btn-anim">Verify Account</button>
            <button type="button" class="back-btn" onclick="resetToLogin()">Back to Login</button>
        </form>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast"></div>

    <style>
        @media (max-width: 480px) {
            .card-container { width: 95% !important; padding: 30px 20px !important; border-radius: 24px !important; }
            h2 { font-size: 24px !important; }
            .subtitle { font-size: 13px !important; }
            .tabs { margin-bottom: 30px !important; }
            .tab-btn { font-size: 13px !important; }
        }
    </style>
    <script src="script.js"></script>
</body>
</html>
